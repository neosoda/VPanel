# Production-grade docker-compose for Coolify deployment
# Build args are set from environment variables - configure in Coolify dashboard

services:
  vpanel:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time env vars (baked into Vite bundle)
        # Use COOLIFY_* variable names to avoid accidental reuse of local .env (dev values).
        VITE_APP_MODE: ${COOLIFY_VITE_APP_MODE:-production}
        VITE_APP_BASE: ${COOLIFY_VITE_APP_BASE:-/}
        VITE_APP_HOSTNAME: ${COOLIFY_VITE_APP_HOSTNAME:-https://example.com}
        VITE_APP_URL: ${COOLIFY_VITE_APP_URL:-https://example.com/}
        VITE_APP_API_URL: ${COOLIFY_VITE_APP_API_URL:-/api/}
        VITE_USE_AUTH: ${COOLIFY_VITE_USE_AUTH:-false}
    
    image: vpanel:latest
    container_name: vpanel-prod
    restart: always
    
    # Internal port exposed to the Coolify reverse proxy
    expose:
      - "8080"
    
    environment:
      # Runtime PHP configuration (can be overridden without rebuild)
      PHP_FPM_PM: dynamic
      PHP_FPM_PM_MAX_CHILDREN: ${PHP_FPM_PM_MAX_CHILDREN:-20}
      PHP_FPM_PM_START_SERVERS: ${PHP_FPM_PM_START_SERVERS:-4}
      PHP_FPM_PM_MIN_SPARE_SERVERS: ${PHP_FPM_PM_MIN_SPARE_SERVERS:-2}
      PHP_FPM_PM_MAX_SPARE_SERVERS: ${PHP_FPM_PM_MAX_SPARE_SERVERS:-10}
      PHP_APP_MODE: ${PHP_APP_MODE:-production}
      APP_HOSTNAME: ${APP_HOSTNAME:-example.com}
      SQLITE_DB_PATH: ${SQLITE_DB_PATH:-/app/public/data/vpanel.sqlite}
    
    # Health check - critical for Coolify orchestration
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health.php | grep -q '\"status\":\"ok\"'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    
    # Logging - JSON driver for log aggregation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "vpanel-prod"
    
    # Security - least privilege principle
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Required for port 8080
    
    # Resource limits - adjust based on infrastructure
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
    
    # Volumes - persistent storage only
    volumes:
      # Persistent SQLite storage (stats + analytics)
      - vpanel_data:/app/public/data:rw
      
      # System timezone consistency
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    
    # Network - custom bridge for Coolify
    networks:
      - vpanel-net

# Network
networks:
  vpanel-net:
    driver: bridge

# Persistent volumes
volumes:
  vpanel_data:
    driver: local
