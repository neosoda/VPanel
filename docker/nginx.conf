# =============================================================
# Nginx — configuration Vpanel (production)
# =============================================================
# Rôle :
#   /          → SPA React (static, fallback vers index.html)
#   /api/      → PHP-FPM (public/api/)
# =============================================================

server {
    listen 8080;
    server_name _;

    # ── Racine des fichiers statiques (frontend compilé) ─────
    root /var/www/html;
    index index.html;

    # Taille max des uploads (notamment les fichiers JSON du projet)
    client_max_body_size 16M;

    # ── Sécurité : en-têtes de base ──────────────────────────
    add_header X-Content-Type-Options  "nosniff"   always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Support reverse-proxy Coolify (headers X-Forwarded-*) ─
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ── Bloc API PHP ─────────────────────────────────────────
    location /api/ {
        # Racine physique des scripts PHP
        root /var/www;

        # Protection : on refuse la navigation de répertoires et
        # l'accès aux fichiers sensibles dans /api/
        location ~* /api/.*\.(json|db|htaccess|sql)$ {
            deny all;
            return 404;
        }
        location ~* /api/.*\.ht {
            deny all;
            return 404;
        }

        # Passage des requêtes PHP à PHP-FPM
        location ~ ^/api/(.+\.php)$ {
            fastcgi_pass            127.0.0.1:9000;
            fastcgi_index           index.php;

            # SCRIPT_FILENAME = /var/www/api/<script>
            fastcgi_param SCRIPT_FILENAME /var/www/api/$1;
            fastcgi_param DOCUMENT_ROOT   /var/www/api;

            # Transmission du mode PHP (production) à tous les scripts
            fastcgi_param PHP_APP_MODE production;

            include fastcgi_params;

            # Délai généreux pour toPdf.php (génération PDF lourde)
            fastcgi_read_timeout 120s;
        }

        # Fichiers statiques dans /api/ (assets toPdf : png, etc.)
        try_files $uri =404;
    }

    # ── Assets statiques : cache long terme ─────────────────
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|webp|png|jpg|jpeg|gif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }

    # ── Manifest PWA : pas de cache ──────────────────────────
    location ~* (manifest\.webmanifest|manifest\.json|sw\.js|workbox-.+\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # ── SPA : toutes les routes inconnues → index.html ──────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Logs ─────────────────────────────────────────────────
    access_log /dev/stdout;
    error_log  /dev/stderr warn;
}
