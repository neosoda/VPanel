# =============================================================
# Vpanel — Docker Compose (Coolify-ready)
# =============================================================
# Utilisation standalone :
#   cp .env.coolify .env.coolify.local   # ajuster les valeurs
#   docker compose --env-file .env.coolify.local up -d
#
# Dans Coolify : importer ce fichier en mode "Docker Compose",
# configurer les variables d'environnement dans l'interface.
# =============================================================

services:

  # ── Application (Nginx + PHP-FPM) ──────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Variables baked dans le bundle Vite au moment du build
        VITE_APP_MODE: ${VITE_APP_MODE:-production}
        VITE_APP_BASE: ${VITE_APP_BASE:-/}
        VITE_APP_LOCALE: ${VITE_APP_LOCALE:-fr-FR}
        VITE_APP_LOCALES: ${VITE_APP_LOCALES:-fr-FR,en-US}
        VITE_APP_HOSTNAME: ${VITE_APP_HOSTNAME:-http://localhost}
        VITE_APP_URL: ${VITE_APP_URL:-http://localhost/}
        VITE_APP_API_URL: ${VITE_APP_API_URL:-http://localhost/api/}
        VITE_SERVER_PORT: ${VITE_SERVER_PORT:-80}
        VITE_USE_AUTH: ${VITE_USE_AUTH:-false}
        VITE_APP_VERSION_RANGE: ${VITE_APP_VERSION_RANGE:->1.3.0}
        VITE_DEFAULT_STEPSIZE: ${VITE_DEFAULT_STEPSIZE:-18}
        VITE_DEFAULT_STEPSPERROW: ${VITE_DEFAULT_STEPSPERROW:-13}
        VITE_DEFAULT_ROWS: ${VITE_DEFAULT_ROWS:-4}
        VITE_DEFAULT_ROWHEIGHT: ${VITE_DEFAULT_ROWHEIGHT:-29}
        VITE_ROWS_MIN: ${VITE_ROWS_MIN:-1}
        VITE_ROWS_MAX: ${VITE_ROWS_MAX:-15}
        VITE_HEIGHT_MIN: ${VITE_HEIGHT_MIN:-10}
        VITE_HEIGHT_MAX: ${VITE_HEIGHT_MAX:-50}
        VITE_ALLOWED_MODULES: ${VITE_ALLOWED_MODULES:-13,18,24}
        VITE_AUTOLOGOUT_TIMEOUT: ${VITE_AUTOLOGOUT_TIMEOUT:-10}
        VITE_PROJECTS_AUTOSAVE_MINUTES: ${VITE_PROJECTS_AUTOSAVE_MINUTES:-2}
    environment:
      # Variables runtime injectées au démarrage du conteneur
      PHP_APP_MODE: production
      # Configuration SQLite
      SQLITE_DB_PATH: /var/www/api/data/vpanel.sqlite
      # Hostname PHP pour la validation du Referer (sans scheme ni slash final)
      APP_HOSTNAME: ${APP_HOSTNAME:-localhost}
      # SMTP (optionnel — laisser vide pour désactiver)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Stats
      STATS_IGNORE_LOCALHOST: ${STATS_IGNORE_LOCALHOST:-false}
      STATS_VISITS_INTERVAL: ${STATS_VISITS_INTERVAL:-30 minutes}
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - vpanel_data:/var/www/api/data
    restart: unless-stopped
    networks:
      - vpanel_net

volumes:
  vpanel_data:
    driver: local

networks:
  vpanel_net:
    driver: bridge
