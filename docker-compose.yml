services:
  vpanel:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_MODE: ${VITE_APP_MODE:-development}
        VITE_APP_BASE: ${VITE_APP_BASE:-/}
        VITE_APP_HOSTNAME: ${VITE_APP_HOSTNAME:-http://localhost:${VPANEL_PORT:-8080}}
        VITE_APP_URL: ${VITE_APP_URL:-http://localhost:${VPANEL_PORT:-8080}/}
        VITE_APP_API_URL: ${VITE_APP_API_URL:-/api/}
        VITE_USE_AUTH: ${VITE_USE_AUTH:-false}
    
    container_name: vpanel-app
    restart: unless-stopped
    
    # Port binding restricted to localhost (dev mode)
    ports:
      - "127.0.0.1:${VPANEL_PORT:-8080}:8080"
    
    environment:
      # PHP-FPM Configuration (can be overridden at runtime)
      PHP_FPM_PM: dynamic
      PHP_FPM_PM_MAX_CHILDREN: ${PHP_FPM_PM_MAX_CHILDREN:-10}
      PHP_FPM_PM_START_SERVERS: ${PHP_FPM_PM_START_SERVERS:-2}
      PHP_FPM_PM_MIN_SPARE_SERVERS: ${PHP_FPM_PM_MIN_SPARE_SERVERS:-1}
      PHP_FPM_PM_MAX_SPARE_SERVERS: ${PHP_FPM_PM_MAX_SPARE_SERVERS:-5}
      PHP_APP_MODE: ${PHP_APP_MODE:-development}
      APP_HOSTNAME: ${APP_HOSTNAME:-localhost}
      SQLITE_DB_PATH: ${SQLITE_DB_PATH:-/app/public/data/vpanel.sqlite}
    
    # Volumes - only persistent storage
    volumes:
      # Persistent SQLite data
      - vpanel_data:/app/public/data:rw
    
    # Health check
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health.php | grep -q '\"status\":\"ok\"'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "vpanel-dev"

volumes:
  vpanel_data:
    driver: local
